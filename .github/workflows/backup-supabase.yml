name: Backup Supabase

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/backup-supabase.yml
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client jq gh

      - name: Generate dump
        env:
          SUPABASE_POOLER_URL: ${{ secrets.SUPABASE_POOLER_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          RAW_URL="${SUPABASE_POOLER_URL:-${SUPABASE_DB_URL:-}}"
          if [ -z "${RAW_URL:-}" ]; then
            echo "Either SUPABASE_POOLER_URL or SUPABASE_DB_URL secret is required"
            exit 1
          fi
          DB_URL="$(echo "$RAW_URL" | tr -d '\r\n\t' | sed -e 's/^ *//' -e 's/ *$//' -e 's/^"//' -e 's/"$//')"
          # Guard against the most common copy typo: db-<ref>.supabase.co
          DB_URL="${DB_URL/@db-/@db.}"
          if [[ ! "$DB_URL" =~ ^postgres(ql)?:// ]]; then
            echo "SUPABASE_DB_URL must be a full URI starting with postgresql://"
            exit 1
          fi
          if [[ "$DB_URL" != *"sslmode="* ]]; then
            if [[ "$DB_URL" == *"?"* ]]; then
              DB_URL="${DB_URL}&sslmode=require"
            else
              DB_URL="${DB_URL}?sslmode=require"
            fi
          fi
          echo "::add-mask::$DB_URL"
          DATE_UTC="$(date -u +%F)"
          FILE="backup-${DATE_UTC}.sql"
          pg_dump --dbname="${DB_URL}" --no-owner --no-privileges --format=plain --file "${FILE}"
          gzip -f "${FILE}"
          echo "BACKUP_TAG=backup-${DATE_UTC}" >> "$GITHUB_ENV"
          echo "BACKUP_FILE=${FILE}.gz" >> "$GITHUB_ENV"

      - name: Upload backup as release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BACKUP_TAG }}
          name: ${{ env.BACKUP_TAG }}
          files: ${{ env.BACKUP_FILE }}
          make_latest: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Retention (keep latest 30 backup releases)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t backup_tags < <(gh release list --limit 200 --json tagName --jq '.[] | .tagName' | awk '/^backup-/')
          if [ "${#backup_tags[@]}" -le 30 ]; then
            echo "No cleanup needed (${#backup_tags[@]} backups)."
            exit 0
          fi
          for tag in "${backup_tags[@]:30}"; do
            echo "Deleting old backup release: ${tag}"
            gh release delete "${tag}" --yes --cleanup-tag
          done

